<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>TP JavaScript</title>
  </head>
  <body>
    <h1>Exercice 4</h1>

    <script>
      let prenom = prompt("Quel est votre prenom ?");
      let age = prompt("Quel est votre age ?");

      age = Number(age);

      let anneeNaissance = 2025 - age;

      alert(`Bonjour ${prenom} ! Vous etes ne vers ${anneeNaissance}.`);

      let afficher = confirm("Afficher dans la console ?");

      if (afficher) {
  console.log("Prenom :", prenom);
  console.log("Age :", age);
  console.log("Annee :", anneeNaissance);
}
    </script>
  </body>
</html>
